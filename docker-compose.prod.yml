services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      DATABASE_URL: mysql://app:app@database:3306/app?serverVersion=8.4&charset=utf8mb4
    depends_on:
      database:
        condition: service_healthy
    # En production, on n'expose pas le port 9000 au public, 
    # mais on l'ouvre pour que le Nginx de la VM puisse lui parler.
    ports:
      - "127.0.0.1:9000:9000"

  database:
    image: mysql:8.4.9
    environment:
      MYSQL_DATABASE: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root_secure_password # Pense à changer ça en prod !
      MYSQL_USER: app
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "app", "-papp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - database_prod_data:/var/lib/mysql:rw

volumes:
  database_prod_data: